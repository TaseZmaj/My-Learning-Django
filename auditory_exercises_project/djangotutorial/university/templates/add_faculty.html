{% extends 'base.html'  %}

{% block title %} Add Faculty {% endblock %}

{% block content %}
    <h1 class="display-1 text-center"> Add New Faculty </h1>
    <div class="container">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-success" type="submit">Submit</button>
        </form>
        <a href="{% url 'university:index' %}" class="btn btn-warning">Back</a>
    </div>
{% endblock %}
